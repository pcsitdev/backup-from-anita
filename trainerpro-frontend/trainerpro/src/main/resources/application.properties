spring.application.name=trainerpro

server.port=8082

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/trainerpro_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# REMOVE THIS LINE
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# CORS
app.cors.allowed-origin=http://localhost:5173,http://localhost:5174,https://trainerspro360.com

# MAIL
app.mail.enabled=false
app.mail.from=no-reply@trainerpro.local

# DEFAULT ADMIN ACCOUNT
app.admin.name=Platform Admin
app.admin.email=alokhalder@gmail.com
app.admin.password=Aloke@123#

